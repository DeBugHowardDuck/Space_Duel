<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Space Duel{% endblock %}</title>
      <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
      <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
<meta name="csrf-token" content="{{ csrf_token }}">
      <script>
          document.addEventListener('htmx:configRequest', function (evt) {
            var meta = document.querySelector('meta[name="csrf-token"]');
            if (meta && meta.content) {
              evt.detail.headers['X-CSRF-Token'] = meta.content;
            }
          });
      </script>
      <style>
  .card { border:1px solid #d0d7de; border-radius:10px; padding:12px; background:#fff; }
  .btn { padding:8px 12px; border:1px solid #cbd5e1; border-radius:8px; background:#f8fafc; cursor:pointer; }
  .btn[disabled] { opacity:.6; cursor:not-allowed; }
  .row { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }

  .log-list { max-height: 140px; overflow:auto; margin:0; padding-left:18px; }

  .log-list li.new { animation: flash-bg 1.2s ease-out; }
  @keyframes flash-bg {
    0%   { background:#fff7ed; }
    100% { background:transparent; }
  }
</style>

<script>

  document.addEventListener('htmx:afterSwap', function (evt) {
    if (evt.detail && evt.detail.target && evt.detail.target.id === 'fight-panel') {
      var log = document.querySelector('#fight-panel .log-list');
      if (log) {

        log.querySelectorAll('li.new').forEach(function(el){ el.classList.remove('new'); });

        log.scrollTop = log.scrollHeight;

        var items = log.querySelectorAll('li');
        if (items.length) { items[items.length - 1].classList.add('new'); }
      }
    }
  });


  document.addEventListener('DOMContentLoaded', function () {
    var log = document.querySelector('#fight-panel .log-list');
    if (log) {
      log.scrollTop = log.scrollHeight;
      var items = log.querySelectorAll('li');
      if (items.length) { items[items.length - 1].classList.add('new'); }
    }
  });
</script>

  </head>
  <body style="font-family: system-ui, Arial, sans-serif; margin: 24px;">
    <header style="margin-bottom: 16px;">
      <h1 style="margin: 0;">Space Duel</h1>
      <nav style="margin-top: 8px;">
        <a href="{{ url_for('web.index') }}">Главная</a> |
        <a href="{{ url_for('web.choose_hero_form') }}">Выбор героя</a> |
        <a href="{{ url_for('web.choose_enemy_form') }}">Выбор врага</a> |
        <a href="{{ url_for('web.fight') }}">Бой (demo)</a> |
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
